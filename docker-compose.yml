services:
  ormod-server:
    image: ghcr.io/nerveyyyy/ormod-server:latest
    container_name: ormod-server
    restart: unless-stopped
    network_mode: host
    volumes:
      - ormod-game:/ormod
      - ./config:/config
      - ./backups:/backups
    environment:
      SERVER_NAME: MyServer
      DESCRIPTION: An ORMOD Server
      MAX_PLAYERS: '8'
      BACKUP_ENABLED: true
    stdin_open: true
    tty: true
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
  ormod-dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: ormod-dashboard
    restart: unless-stopped
    network_mode: host
    environment:
      DATABASE_URL: file:/app/data/ormod-rcon.db
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      HOST: ${DASHBOARD_HOST:-0.0.0.0}
      PORT: ${DASHBOARD_PORT:-3000}
      PUBLIC_URL: ${PUBLIC_URL:-}
      STATIC_PATH: /app/apps/web/dist
      GAME_CONTAINER_NAME: ${GAME_CONTAINER_NAME:-ormod-server}
      TLS_CERT_PATH: ${TLS_CERT_PATH:-}
      TLS_KEY_PATH: ${TLS_KEY_PATH:-}
    volumes:
      - dashboard-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
        reservations:
          memory: 128M

volumes:
  ormod-game:
  dashboard-data:
