# WARNING: mounts the raw Docker socket.
# For internet-facing servers use docker-compose.secure.yml (socket proxy).
#
# Quick start:
#   cp .env.example .env
#   # Edit .env — set BETTER_AUTH_SECRET and PUBLIC_URL
#   docker compose up -d

services:

  # ══════════════════════════════════════════════════════════════════════════════
  # GAME SERVER
  # This section will move to its own repo when WebSocket RCON lands.
  # All vars here are compose-only — the dashboard API does not read them.
  # ══════════════════════════════════════════════════════════════════════════════
  ormod-game:
    build:
      context: .
      dockerfile: docker/Dockerfile.gameserver
    container_name: ${GAME_CONTAINER_NAME:-ormod-game}
    restart: unless-stopped
    environment:
      SERVER_NAME: ${SERVER_NAME:-MyOrmodServer}
      GAME_BINARY_NAME: ${GAME_BINARY_NAME:-ORMODDirective}
    volumes:
      - ${GAME_BINARY_PATH:-./docker/game-binary}:/game   # game binary directory
      - ${SAVES_PATH:-game-saves}:/saves                  # save data + server configs
    ports:
      - '${GAME_HOST:-0.0.0.0}:${GAME_PORT:-27015}:${GAME_PORT:-27015}/udp'
      - '${GAME_HOST:-0.0.0.0}:${QUERY_PORT:-27016}:${QUERY_PORT:-27016}/udp'
      - '${GAME_HOST:-0.0.0.0}:${KCP_PORT:-7777}:${KCP_PORT:-7777}/udp'
    stdin_open: true  # dashboard writes commands to game stdin
    tty: true         # game reads commands via PTY; also produces raw log bytes (no framing)
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'

  # ══════════════════════════════════════════════════════════════════════════════
  # DASHBOARD (API + frontend)
  # HOST/PORT are always 0.0.0.0:3000 inside the container.
  # Use DASHBOARD_PORT to change the host-side port mapping (default: 3000).
  # ══════════════════════════════════════════════════════════════════════════════
  ormod-dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: ormod-dashboard
    restart: unless-stopped
    depends_on:
      ormod-game:
        condition: service_started
    environment:
      DATABASE_URL: file:/app/data/ormod-rcon.db
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      HOST: '0.0.0.0'
      PORT: '3000'
      PUBLIC_URL: ${PUBLIC_URL:-}
      STATIC_PATH: /app/apps/web/dist
      GAME_CONTAINER_NAME: ${GAME_CONTAINER_NAME:-ormod-game}
    volumes:
      - dashboard-data:/app/data                # SQLite database (persisted)
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - '${DASHBOARD_PORT:-3000}:3000'
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
        reservations:
          memory: 128M

volumes:
  game-saves:
  dashboard-data:
