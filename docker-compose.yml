# Host networking — UFW / iptables controls all port access.
# For socket-proxy hardening use docker-compose.secure.yml.
#
# Quick start:
#   cp .env.example .env
#   # Edit .env — set BETTER_AUTH_SECRET and PUBLIC_URL
#   docker compose up -d

services:

  # ══════════════════════════════════════════════════════════════════════════════
  # GAME SERVER (convenience — included so `docker compose up` runs everything)
  # This is a standalone image. Configure it directly below or run it separately
  # using docker-compose.dashboard.yml and your own game server compose.
  # See https://github.com/Nerveyyyy/ormod-server for full env var reference.
  #
  # network_mode: host — the game binary binds to 0.0.0.0 (all interfaces).
  # Use UFW to restrict which IPs accept game traffic, e.g.:
  #   ufw allow in on eth0 to 203.0.113.5 port 27015 proto udp
  # ══════════════════════════════════════════════════════════════════════════════
  ormod-server:
    image: ghcr.io/nerveyyyy/ormod-server:latest
    container_name: ormod-server
    restart: unless-stopped
    network_mode: host
    volumes:
      - ormod-game:/ormod
      - ./config:/config
    environment:
      SERVER_NAME: MyServer
      DESCRIPTION: An ORMOD Server
      MAX_PLAYERS: '8'
    stdin_open: true  # dashboard writes commands to game stdin
    tty: true         # game reads commands via PTY; also produces raw log bytes (no framing)
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'

  # ══════════════════════════════════════════════════════════════════════════════
  # DASHBOARD (API + frontend)
  #
  # network_mode: host — Fastify binds directly to DASHBOARD_HOST:DASHBOARD_PORT
  # on the host. No Docker port mappings, no iptables bypass — UFW is in full
  # control of who can reach the dashboard.
  #
  # DASHBOARD_HOST — IP address Fastify binds to (default: 0.0.0.0).
  #                  Set to a specific IP to restrict which interface serves
  #                  the dashboard, e.g. 10.0.0.1 for LAN-only.
  #
  # DASHBOARD_PORT — Port Fastify listens on (default: 3000).
  # ══════════════════════════════════════════════════════════════════════════════
  ormod-dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: ormod-dashboard
    restart: unless-stopped
    network_mode: host
    environment:
      DATABASE_URL: file:/app/data/ormod-rcon.db
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      HOST: ${DASHBOARD_HOST:-0.0.0.0}
      PORT: ${DASHBOARD_PORT:-3000}
      PUBLIC_URL: ${PUBLIC_URL:-}
      STATIC_PATH: /app/apps/web/dist
      GAME_CONTAINER_NAME: ${GAME_CONTAINER_NAME:-ormod-server}
      TLS_CERT_PATH: ${TLS_CERT_PATH:-}
      TLS_KEY_PATH: ${TLS_KEY_PATH:-}
    volumes:
      - dashboard-data:/app/data                # SQLite database (persisted)
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
        reservations:
          memory: 128M

volumes:
  ormod-game:
  dashboard-data:
