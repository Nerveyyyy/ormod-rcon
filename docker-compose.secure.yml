# docker-compose.secure.yml — Hardened deployment (recommended)
#
# Key hardening measures vs docker-compose.yml:
#
#   1. SOCKET PROXY — The raw Docker socket is NOT mounted into the dashboard.
#      A dedicated socket-proxy container (tecnativa/docker-socket-proxy) acts
#      as a filtered HTTP gateway, exposing ONLY the container-control API
#      paths the dashboard actually uses:
#        GET  /containers/{name}/json       (inspect / TTY detection)
#        POST /containers/{name}/start|stop|restart
#        GET  /containers/{name}/logs       (log streaming)
#        POST /containers/{name}/attach     (command dispatch -> PTY master)
#        POST /containers/{name}/exec       (exec session creation)
#        GET  /exec/{id}/json               (exec inspect)
#        POST /exec/{id}/start              (exec start)
#      All other Docker API endpoints (images, networks, volumes, build,
#      events, swarm, secrets, etc.) are blocked at the proxy level.
#
#   2. NON-ROOT DASHBOARD — The dashboard container process runs as UID 1001
#      (the `dashboard` user created in Dockerfile.dashboard). The entrypoint
#      script briefly chowns the three volume-mount paths as root, then drops
#      privileges before starting Prisma and the Fastify server.
#
#   3. HOST NETWORKING — Both game and dashboard use network_mode: host so
#      Docker does not manipulate iptables. UFW / your firewall controls all
#      port access. The socket proxy binds to 127.0.0.1:2375, reachable only
#      from localhost.
#
# Usage:
#   docker compose -f docker-compose.secure.yml up -d

services:
  # ── Socket proxy ─────────────────────────────────────────────────────────────
  # Sits between /var/run/docker.sock (mounted read-only here) and the dashboard.
  # Implemented by tecnativa/docker-socket-proxy (HAProxy-based HTTP filter).
  # Bound to 127.0.0.1 — only reachable from localhost (the host-networked dashboard).
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0 # Pin to 0.3.0 — upgrade deliberately after reviewing changelog
    container_name: ormod-socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # read-only on the proxy side
    ports:
      - '127.0.0.1:2375:2375'
    environment:
      # ── Allowed API sections ─────────────────────────────────────────────────
      CONTAINERS: 1 # /containers/* — inspect, logs, start, stop, restart, attach
      EXEC: 1 # /exec/*       — create, inspect, start exec sessions
      POST: 1 # allow HTTP POST (needed for start/stop/restart/attach/exec)

      # ── Everything else explicitly disabled ─────────────────────────────────
      IMAGES: 0
      NETWORKS: 0
      VOLUMES: 0
      INFO: 0
      PING: 0
      SERVICES: 0
      SWARM: 0
      TASKS: 0
      SECRETS: 0
      NODES: 0
      BUILD: 0
      EVENTS: 0
      AUTH: 0
      DISTRIBUTION: 0
      PLUGINS: 0
      SYSTEM: 0

  # ══════════════════════════════════════════════════════════════════════════════
  # GAME SERVER (convenience — included so `docker compose up` runs everything)
  # This is a standalone image. Configure it directly below or run it separately
  # using docker-compose.dashboard-secure.yml and your own game server compose.
  # See https://github.com/Nerveyyyy/ormod-server for full env var reference.
  # ══════════════════════════════════════════════════════════════════════════════
  ormod-server:
    image: ghcr.io/nerveyyyy/ormod-server:latest
    container_name: ormod-server
    restart: unless-stopped
    network_mode: host
    volumes:
      - ormod-game:/ormod
      - ./config:/config
    environment:
      SERVER_NAME: MyServer
      DESCRIPTION: An ORMOD Server
      MAX_PLAYERS: '8'
    stdin_open: true  # dashboard writes commands to game stdin
    tty: true         # game reads commands via PTY; also produces raw log bytes (no framing)
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'

  # ══════════════════════════════════════════════════════════════════════════════
  # DASHBOARD (API + frontend)
  #
  # network_mode: host — Fastify binds directly to DASHBOARD_HOST:DASHBOARD_PORT.
  # Docker API calls are routed through socket-proxy at 127.0.0.1:2375.
  # No raw socket mount.
  # ══════════════════════════════════════════════════════════════════════════════
  ormod-dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: ormod-dashboard
    restart: unless-stopped
    network_mode: host
    # Runs as dashboard (UID 1001) after the entrypoint chowns volume mounts.
    # The entrypoint script handles the root->non-root transition automatically.
    depends_on:
      ormod-server:
        condition: service_started
      socket-proxy:
        condition: service_started
    environment:
      DATABASE_URL: file:/app/data/ormod-rcon.db
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      HOST: ${DASHBOARD_HOST:-0.0.0.0}
      PORT: ${DASHBOARD_PORT:-3000}
      PUBLIC_URL: ${PUBLIC_URL:-}
      STATIC_PATH: /app/apps/web/dist
      GAME_CONTAINER_NAME: ${GAME_CONTAINER_NAME:-ormod-server}
      TLS_CERT_PATH: ${TLS_CERT_PATH:-}
      TLS_KEY_PATH: ${TLS_KEY_PATH:-}
      # Route Docker API calls through the socket proxy (localhost) instead of
      # the raw Unix socket. docker-manager.ts reads this and switches to HTTP-over-TCP.
      DOCKER_HOST: tcp://127.0.0.1:2375
    volumes:
      - dashboard-data:/app/data                # SQLite database (persisted)
      # /var/run/docker.sock is intentionally NOT mounted here.
      # All Docker API access goes through socket-proxy on localhost.
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
        reservations:
          memory: 128M

volumes:
  ormod-game:
  dashboard-data: