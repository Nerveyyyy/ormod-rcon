name: Bug report
description: Report a bug to help us improve
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a report. Please fill out the fields below.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behaviour?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Screenshots / logs
      description: If applicable, add screenshots or paste relevant log output.
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS: [e.g. Ubuntu 24.04, Windows 11]
        - Docker version: [e.g. 27.0.3]
        - Browser: [e.g. Chrome 120, Firefox 130]
        - ormod-rcon version/commit: [e.g. abc1234]
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context about the problem.
