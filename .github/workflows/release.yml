name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      rcon_release_created: ${{ steps.release.outputs['packages/rcon--release_created'] }}
      rcon_tag_name: ${{ steps.release.outputs['packages/rcon--tag_name'] }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

  publish-rcon:
    name: publish ormod-rcon to npm
    needs: release
    if: ${{ needs.release.outputs.rcon_release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        working-directory: packages/rcon

      - name: Publish to npm
        run: pnpm publish --no-git-checks --access public
        working-directory: packages/rcon
